<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noites Indie | Lista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-noites page-lista">
  <div class="stars" id="stars"></div>

  <header class="topbar">
    <a href="index.html" class="mini-link">← Início</a>
    <h1>NOITES INDIE • LISTA</h1>
  </header>

  <main class="list-main">
    <section class="list-controls neon-card" aria-label="Busca e ordenação de jogos">
      <label class="search-field" for="search-games">
        Buscar jogo
        <input type="text" id="search-games" placeholder="Digite o nome do jogo" autocomplete="off" />
      </label>

      <div class="sort-controls" role="group" aria-label="Ordenação da lista">
        <button type="button" class="sort-btn is-active" data-sort="added" aria-pressed="true">Ordem de adição</button>
        <button type="button" class="sort-btn" data-sort="date" aria-pressed="false">Data</button>
        <button type="button" class="sort-btn" data-sort="rating" aria-pressed="false">Melhores notas</button>
        <button type="button" class="sort-btn" data-sort="alpha" aria-pressed="false">Alfabética</button>
      </div>
    </section>

    <section id="games-grid" class="games-grid" aria-live="polite"></section>
    <p id="empty-list" class="empty-state">Ainda não há jogos. Clique no botão + para criar o primeiro.</p>
  </main>

  <button class="floating-add" id="btn-new-game" aria-label="Adicionar jogo">+</button>

  <script type="module" src="app.js"></script>
</body>
</html>
